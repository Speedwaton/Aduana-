# ===================================================================
# CONFIGURACIÓN DEL API GATEWAY - FRONTERA LOS LIBERTADORES
# ===================================================================
spring.application.name=ms-gateway
server.port=8080

# ===================================================================
# CONFIGURACIÓN DE EUREKA (Descubrimiento de servicios)
# ===================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ===================================================================
# CONFIGURACIÓN DE RUTAS - TODOS LOS MICROSERVICIOS DE ADUANA
# ===================================================================

# NOTA (Spring Cloud 2025.0+): el prefijo de propiedades del gateway reactivo
# cambió de 'spring.cloud.gateway.routes' a 'spring.cloud.gateway.server.webflux.routes'.
# El prefijo antiguo NO se enlaza en esta versión, por lo que las rutas no cargaban
# y todo /api/** respondía 404.

# Ruta 1: Autenticación (login y registro de usuarios)
spring.cloud.gateway.server.webflux.routes[0].id=ms-autenticacion
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ms-autenticacion
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**

# Ruta 2: Preregistro de viajeros y generación de tickets QR
spring.cloud.gateway.server.webflux.routes[1].id=ms-preregistro
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ms-preregistro
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/preregistro/**

# Ruta 3: Validación de identidad y documentos
spring.cloud.gateway.server.webflux.routes[2].id=ms-validacion
spring.cloud.gateway.server.webflux.routes[2].uri=lb://ms-validacion
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/validacion/**

# Ruta 4: Fila virtual de vehículos
spring.cloud.gateway.server.webflux.routes[3].id=ms-fila-virtual
spring.cloud.gateway.server.webflux.routes[3].uri=lb://ms-fila-virtual
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/fila/**

# Ruta 5: Operaciones aduaneras (revisión de vehículos y carga)
spring.cloud.gateway.server.webflux.routes[4].id=ms-operaciones
spring.cloud.gateway.server.webflux.routes[4].uri=lb://ms-operaciones
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/operaciones/**

# Ruta 6: Notificaciones y turnos
spring.cloud.gateway.server.webflux.routes[5].id=ms-notificaciones
spring.cloud.gateway.server.webflux.routes[5].uri=lb://ms-notificaciones
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/notificaciones/**

# Ruta 7: Reportes y dashboard
spring.cloud.gateway.server.webflux.routes[6].id=ms-reportes
spring.cloud.gateway.server.webflux.routes[6].uri=lb://ms-reportes
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/reportes/**

# ===================================================================
# CONFIGURACIÓN DE LOGS
# ===================================================================
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
