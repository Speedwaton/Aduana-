# ===================================================================
# CONFIGURACIÓN GENERAL DEL MICROSERVICIO DE PREREGISTRO
# ===================================================================
spring.application.name=ms-preregistro
server.port=8084

# ===================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL - Laragon - DB Trámites)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/db_tramites?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# NOTIFICACIONES (sin Kafka) — se avisa a ms-notificaciones por REST
# para que asigne el turno del viajero al crear el preregistro.
# ===================================================================
ms.notificaciones.url=http://ms-notificaciones

# ===================================================================
# CONFIGURACIÓN DE EUREKA (Registro de servicio)
# ===================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ===================================================================
# CONFIGURACIÓN DE LOGS
# ===================================================================
server.error.include-message=always
logging.level.root=INFO
logging.level.com.frontintel.aduanas.ms_preregistro=DEBUG
