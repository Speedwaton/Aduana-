# ===================================================================
# CONFIGURACIÓN GENERAL DEL MICROSERVICIO DE VALIDACIÓN
# ===================================================================
spring.application.name=ms-validacion
server.port=8085

# ===================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL - Laragon - DB Validaciones)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/db_validaciones?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURACIÓN DE EUREKA
# ===================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# URL del microservicio de preregistro para verificar el QR
ms.preregistro.url=http://ms-preregistro

# ===================================================================
# CONFIGURACIÓN DE LOGS
# ===================================================================
server.error.include-message=always
logging.level.root=INFO
logging.level.com.frontintel.aduanas.ms_validacion=DEBUG
