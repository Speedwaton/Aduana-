# ===================================================================
# CONFIGURACIÓN GENERAL DEL MICROSERVICIO DE OPERACIONES
# ===================================================================
spring.application.name=ms-operaciones
server.port=8087

# ===================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL - Laragon - DB Operaciones)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/db_operaciones?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURACIÓN DE EUREKA
# ===================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ===================================================================
# CONFIGURACIÓN DE LOGS
# ===================================================================
server.error.include-message=always
logging.level.root=INFO
logging.level.com.frontintel.aduanas.ms_operaciones=DEBUG
