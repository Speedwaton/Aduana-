# ===================================================================
# CONFIGURACIÓN GENERAL DEL MICROSERVICIO
# ===================================================================
spring.application.name=ms-notificaciones
server.port=8083

# ===================================================================
# CONFIGURACIÓN DE EUREKA (Registro de servicio)
# ===================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ===================================================================
# NOTA: este microservicio ya NO usa Kafka ni Redis.
# - ms-preregistro le asigna el turno por REST (POST /api/notificaciones/turno).
# - Los turnos se guardan en memoria (ver FilaVirtualService).
# Así no se necesita instalar ninguna infraestructura externa.
# ===================================================================

# ===================================================================
# CONFIGURACIÓN DE LOGS
# ===================================================================
logging.level.root=INFO
logging.level.com.frontintel.aduanas.ms_notificaciones=DEBUG
