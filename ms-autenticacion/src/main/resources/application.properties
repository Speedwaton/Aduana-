# ===================================================================
# CONFIGURACIÓN GENERAL DEL MICROSERVICIO
# ===================================================================
spring.application.name=ms-autenticacion
server.port=8081

# ===================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL - Laragon - DB Usuarios)
# ===================================================================
# createDatabaseIfNotExist=true -> MySQL crea la base 'db_usuarios' sola si no existe.
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuarios?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
# 'update' permite que Hibernate cree/actualice las tablas automáticamente.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CÓDIGOS INSTITUCIONALES (registro de personal)
# ------------------------------------------------------------------
# El registro público SIEMPRE crea cuentas VIAJERO. Para crear personal
# (agente aduanero, PDI o supervisor) se usa /registro-institucional con
# el código del rol. En producción estos valores irían en variables de
# entorno, nunca en el repositorio.
# ===================================================================
auth.codigo.funcionario=AGENTE-ADUANA-2026
auth.codigo.pdi=PDI-CHILE-2026
auth.codigo.supervisor=SUPERVISOR-FRONTERA-2026

# ===================================================================
# CONFIGURACIÓN DE EUREKA (Registro de servicio)
# ===================================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ===================================================================
# CONFIGURACIÓN DE VALIDACIONES (Mensajes de error limpios)
# ===================================================================
server.error.include-message=always
server.error.include-binding-errors=always

# ===================================================================
# CONFIGURACIÓN DE LOGS
# ===================================================================
logging.level.root=INFO
logging.level.com.frontintel.aduanas.ms_autenticacion=DEBUG
